<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sabareesh ❤️ Swathi Wedding</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Poppins;
        scroll-behavior: smooth;
      }

      body {
        overflow-x: hidden;
        color: white;
        background: black;
      }

      /* INVITE CARD */

      .invite-wrapper {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1500px;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .card {
        width: 320px;
        height: 420px;
        position: relative;
        transform-style: preserve-3d;
        transition: 1.2s;
        cursor: pointer;
      }

      .card.open {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 30px;
      }

      .front {
        background: #ffdf00;
        color: #d3212d;
      }

      .back {
        background: #d3212d;
        transform: rotateY(180deg);
        border: 3px solid #ffdf00;
      }

      .title {
        font-family: "Great Vibes";
        font-size: 45px;
      }

      /* SECTIONS */

      section {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
        padding: 20px;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.55);
      }

      .content {
        position: relative;
        z-index: 2;
      }

      .section-title {
        font-family: "Great Vibes";
        font-size: 55px;
        color: #ffdf00;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.6);
      }

      /* COUNTDOWN */

      .countdown {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      .time {
        background: #ffdf00;
        color: #d3212d;
        width: 100px;
        height: 100px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .time h3 {
        font-size: 25px;
      }

      /* BUTTON */

      .btn {
        margin-top: 20px;
        padding: 12px 25px;
        background: #ffdf00;
        color: #d3212d;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
      }

      /* HEART ANIMATION */

      .love {
        position: fixed;
        top: -20px;
        font-size: 20px;
        color: #d3212d;
        animation: fall linear infinite;
        pointer-events: none;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
        }
      }

      /* MOBILE */

      @media (max-width: 768px) {
        section {
          background-attachment: scroll;
          height: auto;
          min-height: 100vh;
        }

        .card {
          width: 260px;
          height: 360px;
        }

        .section-title {
          font-size: 40px;
        }

        .countdown {
          flex-wrap: wrap;
          justify-content: center;
        }

        .time {
          width: 70px;
          height: 70px;
        }

        .time h3 {
          font-size: 18px;
        }

        .time p {
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <audio id="music" loop>
      <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" />
    </audio>

    <!-- INVITATION CARD -->

    <div
      class="invite-wrapper"
      style="
        background-image: url(&quot;https://images.unsplash.com/photo-1542042161784-26ab9e041e89&quot;);
      "
      id="invite"
    >
      <div class="card" onclick="openInvite()" id="card">
        <div class="face front">
          <h1 class="title">Wedding Invitation</h1>
          <p>Tap to Open</p>
        </div>

        <div class="face back">
          <h2 class="title">Sabareesh</h2>
          <p>weds</p>
          <h2 class="title">Swathi</h2>
          <p>1st April 2026</p>
        </div>
      </div>
    </div>

    <!-- WEDDING -->

    <section
      style="
        background-image: url(&quot;https://plus.unsplash.com/premium_photo-1670524465634-93cf255ffa8b&quot;);
      "
    >
      <div class="overlay"></div>

      <div class="content">
        <h1 class="section-title">Our Wedding</h1>

        <p style="margin-top: 10px; font-size: 20px; color: #ffdf00">
          1st April • Wednesday • 2026
        </p>

        <div class="countdown">
          <div class="time">
            <h3 id="days"></h3>
            <p>Days</p>
          </div>

          <div class="time">
            <h3 id="hours"></h3>
            <p>Hours</p>
          </div>

          <div class="time">
            <h3 id="minutes"></h3>
            <p>Minutes</p>
          </div>

          <div class="time">
            <h3 id="seconds"></h3>
            <p>Seconds</p>
          </div>
        </div>
      </div>
    </section>

    <!-- DINNER -->

    <section
      style="
        background-image: url(&quot;https://plus.unsplash.com/premium_photo-1698500035173-fdea60f9294e&quot;);
      "
    >
      <div class="overlay"></div>

      <div class="content">
        <h1 class="section-title">Wedding Dinner</h1>
        <p>March 31st • 7:00 PM</p>
      </div>
    </section>

    <!-- MUHURTHAM -->

    <section
      style="
        background-image: url(&quot;https://images.unsplash.com/photo-1597157639073-69284dc0fdaf&quot;);
      "
    >
      <div class="overlay"></div>

      <div class="content">
        <h1 class="section-title">Muhurtham</h1>
        <p>April 1st • 6:30 AM</p>
      </div>
    </section>

    <!-- LOCATION -->

    <section
      style="
        background-image: url(&quot;https://images.unsplash.com/photo-1772127822552-ce9ef537bdcf&quot;);
      "
    >
      <div class="overlay"></div>

      <div class="content">
        <h1 class="section-title">Wedding Venue</h1>

        <p>Sri Convention Hall</p>

        <button
          class="btn"
          onclick="window.open('https://maps.app.goo.gl/Z1mjToF8HhKAmzev7')"
        >
          Open Maps
        </button>
      </div>
    </section>

    <script>
      /* OPEN INVITE */

      function openInvite() {
        document.getElementById("card").classList.add("open");

        document.getElementById("music").play();

        // setTimeout(()=>{
        // document.getElementById("invite").style.display="none";
        // },3000);
      }

      window.addEventListener("scroll", function () {
        let scroll = window.pageYOffset;

        document.querySelectorAll(".parallax-bg").forEach((bg) => {
          bg.style.transform = "translateY(" + scroll * 0.3 + "px)";
        });
      });

      /* HEARTS */

      for (let i = 0; i < 40; i++) {
        let love = document.createElement("div");
        love.className = "love";
        love.innerHTML = "❤";

        love.style.left = Math.random() * 100 + "vw";
        love.style.animationDuration = 4 + Math.random() * 5 + "s";

        document.body.appendChild(love);
      }

      /* COUNTDOWN */

      const weddingDate = new Date("April 1, 2026 06:30:00").getTime();

      setInterval(() => {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        if (distance < 0) return;

        document.getElementById("days").innerText = Math.floor(
          distance / (1000 * 60 * 60 * 24),
        );

        document.getElementById("hours").innerText = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );

        document.getElementById("minutes").innerText = Math.floor(
          (distance % (1000 * 60 * 60)) / (1000 * 60),
        );

        document.getElementById("seconds").innerText = Math.floor(
          (distance % (1000 * 60)) / 1000,
        );
      }, 1000);
    </script>
  </body>
</html>
